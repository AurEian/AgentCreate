version: '3.8'

services:
  # Node.js 应用（不再直接暴露端口，通过 nginx 代理）
  glass-blog:
    build: .
    image: glass-blog:1.0
    container_name: glass-blog
    expose:
      - "3000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/public/uploads
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/blog.db
    restart: unless-stopped

  # Nginx 反向代理（对外暴露 80 端口）
  nginx:
    image: nginx:alpine
    container_name: glass-blog-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - glass-blog
    restart: unless-stopped
